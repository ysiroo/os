<!DOCTYPE html>
<html lang="id" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard - About Me OS</title>

  <!-- PWA -->
  <meta name="theme-color" content="#e3000f">
  <link rel="manifest" href="manifest.json">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg:#f1f5f9;
      --card:#ffffffcc;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --sidebar:#ffffffaa;
      --primary:#e3000f;

    }

    .dark{

      --bg:#020617;
      --card:#0f172acc;
      --text:#ffffff;
      --muted:#94a3b8;
      --border:#1e293b;
      --sidebar:#0f172acc;
      --primary:#ff1f2d;

    }

    body{

      font-family:Inter,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      transition:.3s;

      background-image:
      radial-gradient(circle at top right,
      rgba(255,0,0,.12),
      transparent 30%),

      radial-gradient(circle at bottom left,
      rgba(99,102,241,.10),
      transparent 30%);

    }

    .glass{

      background:var(--card);
      backdrop-filter:blur(20px);
      border:1px solid var(--border);

    }

    .sidebar{

      background:var(--sidebar);
      backdrop-filter:blur(25px);
      border-right:1px solid var(--border);

    }

    .menu{

      transition:.3s;
      color:var(--muted);

    }

    .menu:hover{

      background:rgba(227,0,15,.08);
      color:var(--primary);

    }

    .menu.active{

      background:rgba(227,0,15,.12);
      color:var(--primary);
      font-weight:700;

    }

    .card{

      transition:.3s;

    }

    .card:hover{

      transform:translateY(-4px);

    }

    .theme-btn{

      width:52px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      background:white;
      cursor:pointer;

    }

    .dark .theme-btn{

      background:#0f172a;

    }

  </style>

</head>

<body>

<script>

  // LOGIN CHECK
  if(localStorage.getItem('os_login') !== 'true'){

    window.location.href='login.html';

  }

</script>

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="sidebar hidden lg:flex flex-col w-[270px] p-6">

    <!-- LOGO -->
    <div class="flex items-center gap-4 mb-10">

      <div class="w-14 h-14 rounded-2xl bg-red-600 flex items-center justify-center shadow-xl shadow-red-500/30 text-white">
        <i data-lucide="command"></i>
      </div>

      <div>

        <h1 class="font-bold text-2xl">
          About Me <span class="text-red-600">OS</span>
        </h1>

        <p class="text-sm text-slate-500">
          Personal Workspace
        </p>

      </div>

    </div>

    <!-- MENU -->
    <nav class="flex flex-col gap-2">

      <a href="dashboard.html"
         class="menu active flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="layout-dashboard"></i>
        Beranda

      </a>

      <a href="finance.html"
         class="menu flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="wallet"></i>
        Keuangan

      </a>

      <a href="relations.html"
         class="menu flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="users"></i>
        Relasi

      </a>

      <a href="scanner.html"
         class="menu flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="scan"></i>
        Scanner

      </a>

      <a href="ai.html"
         class="menu flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="bot"></i>
        AI Chat

      </a>

      <a href="profile.html"
         class="menu flex items-center gap-4 p-4 rounded-2xl">

        <i data-lucide="user"></i>
        Profile

      </a>

    </nav>

    <!-- FOOT -->
    <div class="mt-auto">

      <!-- THEME -->
      <button
        onclick="toggleTheme()"
        class="glass w-full rounded-2xl p-4 flex items-center gap-3 mb-4">

        <i data-lucide="moon"></i>
        Dark Mode

      </button>

      <!-- PROFILE -->
      <div class="glass rounded-3xl p-4 flex items-center gap-3">

        <div class="w-14 h-14 rounded-full bg-red-600 text-white flex items-center justify-center text-xl">
          AO
        </div>

        <div>

          <h3 class="font-bold">
            Admin User
          </h3>

          <p class="text-sm text-slate-500">
            admin@os.me
          </p>

        </div>

      </div>

    </div>

  </aside>

  <!-- CONTENT -->
  <main class="flex-1 p-6 lg:p-8">

    <!-- HERO -->
    <section class="glass rounded-[32px] p-8 mb-8 relative overflow-hidden">

      <div class="absolute top-0 right-0 opacity-10">
        <i data-lucide="hexagon" class="w-56 h-56"></i>
      </div>

      <div class="relative z-10">

        <p class="text-sm text-slate-500 mb-2">
          Status Keuangan Bulan Ini
        </p>

        <h1 class="text-5xl font-bold mb-8">
          Rp 12.500.000
        </h1>

        <div class="grid md:grid-cols-2 gap-4">

          <div class="bg-white/10 rounded-2xl p-5">

            <p class="text-sm text-slate-300">
              Pemasukan
            </p>

            <h2 class="text-2xl font-bold">
              + Rp 15M
            </h2>

          </div>

          <div class="bg-white/10 rounded-2xl p-5">

            <p class="text-sm text-slate-300">
              Pengeluaran
            </p>

            <h2 class="text-2xl font-bold">
              - Rp 2.5M
            </h2>

          </div>

        </div>

      </div>

    </section>

    <!-- QUICK -->
    <section class="mb-10">

      <h2 class="text-2xl font-bold mb-6">
        Akses Cepat
      </h2>

      <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-5">

        <a href="finance.html"
           class="glass card rounded-3xl p-6 flex flex-col items-center gap-4">

          <div class="w-16 h-16 rounded-2xl bg-red-100 text-red-500 flex items-center justify-center">
            <i data-lucide="wallet"></i>
          </div>

          Keuangan

        </a>

        <a href="relations.html"
           class="glass card rounded-3xl p-6 flex flex-col items-center gap-4">

          <div class="w-16 h-16 rounded-2xl bg-blue-100 text-blue-500 flex items-center justify-center">
            <i data-lucide="users"></i>
          </div>

          Relasi

        </a>

        <a href="scanner.html"
           class="glass card rounded-3xl p-6 flex flex-col items-center gap-4">

          <div class="w-16 h-16 rounded-2xl bg-orange-100 text-orange-500 flex items-center justify-center">
            <i data-lucide="scan"></i>
          </div>

          Scanner

        </a>

        <a href="ai.html"
           class="glass card rounded-3xl p-6 flex flex-col items-center gap-4">

          <div class="w-16 h-16 rounded-2xl bg-green-100 text-green-500 flex items-center justify-center">
            <i data-lucide="bot"></i>
          </div>

          AI Chat

        </a>

      </div>

    </section>

  </main>

</div>

<script>

  lucide.createIcons();

  // THEME
  const savedTheme = localStorage.getItem('theme');

  if(savedTheme === 'dark'){

    document.documentElement.classList.add('dark');

  }

  function toggleTheme(){

    document.documentElement.classList.toggle('dark');

    if(document.documentElement.classList.contains('dark')){

      localStorage.setItem('theme','dark');

    }else{

      localStorage.setItem('theme','light');

    }

  }

  // PWA
  if('serviceWorker' in navigator){

    navigator.serviceWorker.register('./sw.js');

  }

</script>

</body>
</html>
