<!DOCTYPE html>
<html lang="id" class="dark">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login - About Me OS</title>

  <!-- PWA -->
  <meta name="theme-color" content="#e3000f">

  <link rel="manifest" href="manifest.json">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#e3000f',
            darkbg: '#020617'
          }
        }
      }
    }
  </script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Inter,sans-serif;
      background:#020617;
      color:white;
      min-height:100vh;
      overflow:hidden;

      background-image:
        radial-gradient(at top left,#3b0a0a 0%,transparent 50%),
        radial-gradient(at bottom right,#1e293b 0%,transparent 50%);
    }

    .glass{
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.08);
    }

    .input{
      width:100%;
      background:rgba(15,23,42,.7);
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      padding:16px 18px;
      color:white;
      outline:none;
      transition:.3s;
    }

    .input:focus{
      border-color:#e3000f;
      box-shadow:0 0 0 4px rgba(227,0,15,.15);
    }

    .btn{
      width:100%;
      background:#e3000f;
      border:none;
      padding:16px;
      border-radius:18px;
      color:white;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
    }

    .btn:hover{
      background:#b3000b;
      transform:translateY(-2px);
    }

    .floating{
      animation:floating 4s ease-in-out infinite;
    }

    @keyframes floating{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }

    }

  </style>

</head>

<body>

  <!-- BG -->
  <div class="absolute top-[-150px] left-[-150px] w-[350px] h-[350px] bg-red-600/30 rounded-full blur-3xl"></div>

  <div class="absolute bottom-[-150px] right-[-150px] w-[350px] h-[350px] bg-blue-600/20 rounded-full blur-3xl"></div>

  <!-- MAIN -->
  <main class="relative z-10 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md glass rounded-[32px] p-8 shadow-2xl">

      <!-- LOGO -->
      <div class="text-center mb-8">

        <div class="floating w-24 h-24 mx-auto rounded-[28px] bg-primary flex items-center justify-center shadow-2xl shadow-red-900/40 mb-5">

          <i data-lucide="command" class="w-12 h-12"></i>

        </div>

        <h1 class="text-4xl font-bold mb-2">
          About Me OS
        </h1>

        <p class="text-slate-400 leading-relaxed">
          Personal Operating System
        </p>

      </div>

      <!-- FORM -->
      <form id="loginForm">

        <!-- EMAIL -->
        <div class="mb-5">

          <label class="block text-sm text-slate-400 mb-2">
            Email
          </label>

          <div class="relative">

            <i
              data-lucide="mail"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500">
            </i>

            <input
              id="email"
              type="email"
              required
              placeholder="admin@os.me"
              class="input pl-12"
            />

          </div>

        </div>

        <!-- PASSWORD -->
        <div class="mb-6">

          <label class="block text-sm text-slate-400 mb-2">
            Password
          </label>

          <div class="relative">

            <i
              data-lucide="lock"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500">
            </i>

            <input
              id="password"
              type="password"
              required
              placeholder="admin123"
              class="input pl-12"
            />

          </div>

        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="btn"
        >
          Login Dashboard
        </button>

      </form>

      <!-- INFO -->
      <div class="mt-8 glass rounded-2xl p-4">

        <p class="text-sm text-slate-400 mb-3">
          Demo Login
        </p>

        <div class="space-y-2 text-sm">

          <div class="flex justify-between">

            <span class="text-slate-500">
              Email
            </span>

            <span>
              admin@os.me
            </span>

          </div>

          <div class="flex justify-between">

            <span class="text-slate-500">
              Password
            </span>

            <span>
              admin123
            </span>

          </div>

        </div>

      </div>

    </div>

  </main>

<script>

  lucide.createIcons();

  /*
    ==========================================
    AUTO LOGIN CHECK
    ==========================================
  */

  if(localStorage.getItem('os_login') === 'true'){

    window.location.href = 'dashboard.html';

  }

  /*
    ==========================================
    LOGIN SYSTEM
    ==========================================
  */

  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', function(e){

    e.preventDefault();

    const email = document.getElementById('email').value;

    const password = document.getElementById('password').value;

    /*
      DEMO LOGIN
    */

    if(
      email === 'admin@os.me'
      &&
      password === 'admin123'
    ){

      /*
        SAVE LOGIN
      */

      localStorage.setItem('os_login', 'true');

      /*
        REDIRECT
      */

      window.location.href = 'dashboard.html';

    }else{

      alert('Email atau password salah');

    }

  });

  /*
    ==========================================
    SERVICE WORKER
    ==========================================
  */

  if('serviceWorker' in navigator){

    navigator.serviceWorker.register('./sw.js');

  }

</script>

</body>
</html>
