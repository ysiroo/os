<!DOCTYPE html>
<html lang="id" class="dark">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Relasi - About Me OS</title>

  <meta name="theme-color" content="#e3000f">

  <link rel="manifest" href="manifest.json">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary:'#e3000f'
          }
        }
      }
    }
  </script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Inter,sans-serif;
      background:#020617;
      color:white;
      min-height:100vh;

      background-image:
      radial-gradient(at top left,#3b0a0a 0%,transparent 50%),
      radial-gradient(at bottom right,#1e293b 0%,transparent 50%);
    }

    .glass{
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.08);
    }

    .card-hover{
      transition:.3s;
    }

    .card-hover:hover{
      transform:translateY(-4px);
    }

  </style>

</head>

<body>

<!-- LOGIN CHECK -->
<script>

  if(localStorage.getItem('os_login') !== 'true'){

    window.location.href='login.html';

  }

</script>

<div class="p-4 md:p-8">

  <!-- TOPBAR -->
  <header class="glass rounded-3xl p-5 mb-6 flex items-center justify-between">

    <div>

      <p class="text-slate-400 text-sm">
        Workspace Relasi
      </p>

      <h1 class="text-3xl font-bold">
        Kontak & Relasi
      </h1>

    </div>

    <div class="flex items-center gap-3">

      <a
        href="dashboard.html"
        class="glass w-12 h-12 rounded-2xl flex items-center justify-center">

        <i data-lucide="home"></i>

      </a>

      <button
        class="w-12 h-12 rounded-2xl bg-primary flex items-center justify-center">

        <i data-lucide="plus"></i>

      </button>

    </div>

  </header>

  <!-- SEARCH -->
  <div class="glass rounded-3xl p-4 mb-6">

    <div class="relative">

      <i
        data-lucide="search"
        class="absolute left-4 top-4 w-5 h-5 text-slate-500">
      </i>

      <input
        type="text"
        placeholder="Cari relasi..."
        class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none"
      />

    </div>

  </div>

  <!-- GRID -->
  <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

    <!-- CARD -->
    <div class="glass rounded-3xl p-6 card-hover">

      <!-- HEADER -->
      <div class="flex items-start justify-between mb-5">

        <div class="flex items-center gap-4">

          <img
            src="https://i.pravatar.cc/300?img=12"
            class="w-20 h-20 rounded-3xl object-cover border border-white/10"
          />

          <div>

            <h3 class="text-xl font-bold">
              Budi Santoso
            </h3>

            <p class="text-slate-400 text-sm">
              Supplier
            </p>

            <span class="inline-block mt-2 px-3 py-1 rounded-full bg-green-500/20 text-green-300 text-xs">
              Aktif
            </span>

          </div>

        </div>

      </div>

      <!-- INFO -->
      <div class="space-y-4 text-sm">

        <div class="flex items-center gap-3">

          <i data-lucide="phone" class="w-4 h-4 text-slate-400"></i>

          <a
            href="https://wa.me/628123456789"
            target="_blank"
            class="hover:text-green-400">

            +62 812 3456 789

          </a>

        </div>

        <div class="flex items-center gap-3">

          <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i>

          <a
            href="mailto:budi@email.com"
            class="hover:text-blue-400">

            budi@email.com

          </a>

        </div>

        <div class="flex items-start gap-3">

          <i data-lucide="map-pin" class="w-4 h-4 text-slate-400 mt-1"></i>

          <a
            href="https://maps.google.com/?q=Banyuwangi"
            target="_blank"
            class="text-slate-300 hover:text-primary">

            Banyuwangi, Jawa Timur

          </a>

        </div>

        <div class="flex items-center gap-3">

          <i data-lucide="briefcase" class="w-4 h-4 text-slate-400"></i>

          <span>
            PT Sumber Makmur
          </span>

        </div>

      </div>

      <!-- NOTES -->
      <div class="glass rounded-2xl p-4 mt-5">

        <p class="text-xs text-slate-400 mb-2">
          Catatan
        </p>

        <p class="text-sm leading-relaxed text-slate-300">
          Supplier bahan bangunan.
          Fast respon dan pengiriman cepat.
        </p>

      </div>

      <!-- ACTION -->
      <div class="grid grid-cols-3 gap-3 mt-5">

        <a
          href="https://wa.me/628123456789"
          target="_blank"
          class="bg-green-500/20 hover:bg-green-500/30 transition rounded-2xl p-3 flex items-center justify-center">

          <i data-lucide="message-circle"></i>

        </a>

        <a
          href="tel:+628123456789"
          class="bg-blue-500/20 hover:bg-blue-500/30 transition rounded-2xl p-3 flex items-center justify-center">

          <i data-lucide="phone-call"></i>

        </a>

        <a
          href="mailto:budi@email.com"
          class="bg-purple-500/20 hover:bg-purple-500/30 transition rounded-2xl p-3 flex items-center justify-center">

          <i data-lucide="mail"></i>

        </a>

      </div>

    </div>

  </section>

</div>

<!-- FLOAT BUTTON -->
<button
  class="fixed bottom-6 right-6 w-16 h-16 rounded-3xl bg-primary shadow-2xl shadow-red-900/40 flex items-center justify-center">

  <i data-lucide="plus"></i>

</button>

<script>

  lucide.createIcons();

  if('serviceWorker' in navigator){

    navigator.serviceWorker.register('./sw.js');

  }

</script>

</body>
</html>
