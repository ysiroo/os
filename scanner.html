<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Scanner - About Me OS</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Inter,sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="min-h-screen p-6">

<div class="max-w-5xl mx-auto">

  <div class="flex items-center justify-between mb-6">

    <div>
      <h1 class="text-3xl font-bold">OCR Scanner</h1>
      <p class="text-slate-400">Scan nota dan dokumen otomatis</p>
    </div>

    <a href="dashboard.html"
       class="bg-red-600 px-5 py-3 rounded-2xl">
      Dashboard
    </a>

  </div>

  <div class="glass rounded-3xl p-10 text-center">

    <div class="w-28 h-28 rounded-full bg-red-500/20 mx-auto flex items-center justify-center mb-6">
      <i data-lucide="scan-line" class="w-12 h-12 text-red-400"></i>
    </div>

    <h2 class="text-2xl font-bold mb-3">
      Upload Nota atau Dokumen
    </h2>

    <p class="text-slate-400 mb-8">
      OCR otomatis membaca nominal, tanggal, dan merchant
    </p>

    <input type="file" class="mb-6">

    <div class="glass rounded-2xl p-6 text-left max-w-md mx-auto">

      <p class="mb-2"><b>Merchant:</b> Kopi Kenangan</p>
      <p class="mb-2"><b>Tanggal:</b> 30 Mei 2026</p>
      <p><b>Total:</b> Rp 45.000</p>

    </div>

  </div>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
